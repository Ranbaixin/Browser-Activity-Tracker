<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Activity Tracker Pro</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --text: #1e293b;
      --border: #e2e8f0;
    }
    body { width: 320px; font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: white; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #64748b; }
    .tab.active { color: var(--primary); box-shadow: inset 0 -2px 0 var(--primary); }
    .content { padding: 16px; min-height: 200px; }
    
    /* 实时计时器样式 */
    .live-session {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    #liveTimer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: #1d4ed8;
    }
    .live-label { font-size: 10px; text-transform: uppercase; color: #60a5fa; margin-bottom: 4px; font-weight: 800; }

    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin: 16px 0 8px 0; font-weight: 700; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #f1f5f9; }
    .setting-label { font-size: 13px; font-weight: 500; }
    select, input, textarea { font-size: 12px; padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1; background: white; }
    textarea { width: 100%; height: 60px; margin-top: 8px; resize: none; box-sizing: border-box; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-top: 8px; font-size: 13px; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: #fee2e2; color: #ef4444; }
    .btn-purple { background: #8b5cf6; color: white; }
    .btn-orange { background: #f59e0b; color: white; }
    .site-list { list-style: none; padding: 0; margin: 0; }
    .site-item { display: flex; justify-content: space-between; padding: 10px; background: white; border-radius: 8px; margin-bottom: 6px; border: 1px solid #f1f5f9; }
    .site-domain { font-weight: 600; font-size: 13px; color: #334155; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .site-time { color: #64748b; font-size: 12px; font-family: monospace; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tab-stats">📊 统计</div>
    <div class="tab" id="tab-settings">⚙️ 设置</div>
  </div>

  <div id="statsTab" class="content">
    <!-- 实时会话显示 -->
    <div class="live-session">
      <div class="live-label">当前正在计时</div>
      <div id="liveTimer">等待活动...</div>
    </div>

    <div class="section-title">今日活跃排行</div>
    <ul id="siteList" class="site-list"></ul>
    
    <div class="section-title">辅助工具</div>
    <button id="locateBallBtn" class="btn btn-purple">🎯 定位悬浮球 (居中闪烁)</button>
    <button id="openMiniWinBtn" class="btn btn-orange">🪟 开启独立置顶窗口</button>
  </div>

  <div id="settingsTab" class="content" style="display: none;">
    <div class="section-title">悬浮球个性化</div>
    <div class="setting-item">
      <span class="setting-label">启用悬浮球</span>
      <input type="checkbox" id="clockVisibleCheck">
    </div>
    <div class="setting-item">
      <span class="setting-label">主题颜色</span>
      <select id="clockColor">
        <option value="#3b82f6">经典蓝</option>
        <option value="#10b981">翡翠绿</option>
        <option value="#8b5cf6">丁香紫</option>
        <option value="#f59e0b">琥珀橙</option>
        <option value="#ef4444">珊瑚红</option>
      </select>
    </div>
    <div class="setting-item">
      <span class="setting-label">显示尺寸</span>
      <select id="clockSize">
        <option value="0.7">极小</option>
        <option value="0.85">较小</option>
        <option value="1">标准</option>
        <option value="1.2">较大</option>
      </select>
    </div>

    <div class="section-title">追踪偏好</div>
    <div class="setting-item">
      <span class="setting-label">闲置超时 (分钟)</span>
      <input type="number" id="idleTimeout" min="1" max="120" style="width: 50px;">
    </div>
    <div class="setting-label">黑名单 (每行一个域名)</div>
    <textarea id="blacklist" placeholder="example.com&#10;internal.corp"></textarea>

    <div class="section-title">数据维护</div>
    <button id="exportBtn" class="btn btn-primary">导出详细 JSON 报告</button>
    <button id="resetBtn" class="btn btn-danger">清空所有历史数据</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
